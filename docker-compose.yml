services:
  postgres:
    image: postgres:16-alpine
    container_name: tixflo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tixflo
    ports:
      - "5432:5432"
    volumes:
      - tixflo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tixflo"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  tixflo_postgres_data:
